name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version from tag
        id: meta
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Verify version matches plugin files
        shell: bash
        run: |
          PLUGIN_VERSION="$(sed -n 's/^ \* Version:[[:space:]]*//p' wp-gemini-watermark-remover.php | head -n 1 | xargs)"
          CONST_VERSION="$(sed -n "s/^define('DGZ_VERSION', '\([^']*\)');$/\1/p" wp-gemini-watermark-remover.php | head -n 1)"
          README_VERSION="$(sed -n 's/^| \*\*Versión\*\* | //p' readme.md | head -n 1 | xargs)"
          TAG_VERSION="${{ steps.meta.outputs.version }}"

          test -n "$PLUGIN_VERSION"
          test -n "$CONST_VERSION"
          test -n "$README_VERSION"

          [ "$PLUGIN_VERSION" = "$TAG_VERSION" ]
          [ "$CONST_VERSION" = "$TAG_VERSION" ]
          [ "$README_VERSION" = "$TAG_VERSION" ]

      - name: Build release zip
        shell: bash
        run: |
          rm -rf dist
          mkdir -p dist/package/wp-gemini-watermark-remover

          shopt -s dotglob nullglob
          for path in * .*; do
            case "$path" in
              .|..|.git|.github|.claude|dist)
                continue
                ;;
            esac

            cp -R "$path" dist/package/wp-gemini-watermark-remover/
          done

          cd dist/package
          zip -r "../wp-gemini-watermark-remover-${{ steps.meta.outputs.version }}.zip" "wp-gemini-watermark-remover"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          files: dist/wp-gemini-watermark-remover-${{ steps.meta.outputs.version }}.zip
